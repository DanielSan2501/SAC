{% extends "base.html" %}

{% block content %}
<h2>Registro de Usuario</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        <div class="flash-messages">
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}
{% endwith %}

<form method="POST">

    <label for="tipo_documento">Tipo de documento:</label><br>
    <input type="text" name="tipo_documento" id="tipo_documento" placeholder="Tipo de documento" required><br>

    <label for="numero_documento">Número de documento:</label><br>
    <input type="text" name="numero_documento" id="numero_documento" placeholder="Número de documento" required><br>

    <label for="nombre_completo">Nombre completo:</label><br>
    <input type="text" name="nombre_completo" id="nombre_completo" placeholder="Nombre completo" required><br>

    <label for="correo">Correo:</label><br>
    <input type="email" name="correo" id="correo" placeholder="Correo" required><br>

    <label for="password">Contraseña:</label><br>
    <input type="password" name="password" id="password" placeholder="Contraseña" required><br>
    
    <label for="telefono">Teléfono:</label><br>
    <input type="text" name="telefono" id="telefono" placeholder="Teléfono" required><br>

    <label for="rol">Rol:</label><br>
    <select name="rol" id="rol" required>
        <option value="cliente">Cliente</option>
        <option value="clinica">Clínica</option>
    </select><br>

    <button type="submit">Registrar</button>

</form>
{% endblock %}
