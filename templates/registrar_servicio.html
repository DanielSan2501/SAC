{% extends "dashboard_base.html" %}

{% block content %}

{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        <div class="flash-messages">
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}
{% endwith %}

<div class="card shadow mb-4 border-left-success">
    <div class="card-header py-3">
        <h6 class="m-0 font-weight-bold text-success">Registrar Servicio</h6>
    </div>
    <div class="card-body">

        <div class="col-lg-12 p-3">

            <form method="POST">

                <h6 class="mb-3 text-success">Información del servicio</h6>

                <div class="form-row">

                    <div class="form-group col-md-6">
                        <label for="tipo_servicio">Tipo de servicio</label>
                        <input type="text" class="form-control" id="tipo_servicio" name="tipo_servicio" required>
                    </div>

                    <div class="form-group col-md-6">
                        <label for="nombre">Nombre</label>
                        <input type="text" class="form-control" id="nombre" name="nombre" required>
                    </div>

                    <div class="form-group col-md-12">
                        <label for="descripcion">Descripción</label>
                        <textarea class="form-control" id="descripcion" name="descripcion"></textarea>
                    </div>

                    <div class="form-group col-md-6">
                        <label for="precio">Precio</label>
                        <input type="number" class="form-control" id="precio" name="precio" required>
                    </div>

                    <div class="form-group col-md-6">
                        <label for="duracion">Duración (minutos)</label>
                        <input type="number" class="form-control" id="duracion" name="duracion" required>
                    </div>

                </div>

                <button type="submit" class="btn btn-success btn-icon-split">
                    <span class="icon text-white-50">
                        <i class="fas fa-check"></i>
                    </span>
                    <span class="text">Registrar Servicio</span>
                </button>

            </form>
        </div>
    </div>
</div>

{% endblock %}
