{% extends "dashboard_base.html" %}

{% block content %}

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <!-- Basic Card Example -->
        <div class="card shadow mb-4 border-left-success">
            <div class="card-header py-3">
                <h6 class="m-0 font-weight-bold text-success">Registrar Mascota</h6>
            </div>
            <div class="card-body">

                <div class="col-lg-10 p-3">

                    <form method="POST">

                        <h6 class="mb-3 text-success">Información básica</h6>

                        <div class="form-row">

                            <!-- Nombre -->
                            <div class="form-group col-md-6">
                                <label for="nombre">Nombre</label>
                                <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Nombre de la mascota" required>
                            </div>

                            <!-- Especie -->
                            <div class="form-group col-md-6">
                                <label for="especie">Especie</label>
                                <input type="text" class="form-control" id="especie" name="especie" placeholder="Ej: Perro, Gato" required>
                        </div>

                        <!-- Raza -->
                        <div class="form-group col-md-6">
                            <label for="raza">Raza</label>
                            <input type="text" class="form-control" id="raza" name="raza" placeholder="Opcional">
                        </div>

                        <!-- Sexo -->
                        <div class="form-group col-md-6">
                            <label for="sexo">Sexo</label>
                            <select class="form-control" id="sexo" name="sexo" required>
                                <option value="">Selecciona</option>
                                <option value="Macho">Macho</option>
                                <option value="Hembra">Hembra</option>
                            </select>
                        </div>

                        <!-- Edad -->
                        <div class="form-group col-md-4">
                            <label for="edad">Edad</label>
                            <input type="number" class="form-control" id="edad" name="edad">
                        </div>

                        <!-- Peso -->
                        <div class="form-group col-md-4">
                            <label for="peso">Peso (kg)</label>
                            <input type="number" step="0.1" class="form-control" id="peso" name="peso" required>
                        </div>

                        <!-- Fecha -->
                        <div class="form-group col-md-4">
                            <label for="fecha_nacimiento">Fecha de Nacimiento</label>
                            <input type="date" class="form-control" id="fecha_nacimiento" name="fecha_nacimiento">
                        </div>

                    </div>

                    <button type="submit" class="btn btn-success btn-icon-split">
                        <span class="icon text-white-50">
                            <i class="fas fa-check"></i>
                        </span>
                        <span class="text">Registrar Mascota</span>
                    </button>

                </form>
            </div>
        </div>
    </div>

{% endblock %}
